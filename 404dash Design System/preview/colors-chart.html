<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #1a1d27; padding: 16px; font-family: var(--font-sans); }
.grid { display: flex; gap: 10px; }
.swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.block { width: 48px; height: 48px; border-radius: 8px; }
.name { font-size: 10px; color: #94A3B8; }
.chart-preview { margin-top: 12px; display: flex; align-items: flex-end; gap: 4px; height: 50px; }
.bar { width: 28px; border-radius: 4px 4px 0 0; }
</style>
</head>
<body>
<div class="grid">
  <div class="swatch"><div class="block" style="background:#6366F1"></div><div class="name">Chart 1</div></div>
  <div class="swatch"><div class="block" style="background:#10B981"></div><div class="name">Chart 2</div></div>
  <div class="swatch"><div class="block" style="background:#F59E0B"></div><div class="name">Chart 3</div></div>
  <div class="swatch"><div class="block" style="background:#38BDF8"></div><div class="name">Chart 4</div></div>
  <div class="swatch"><div class="block" style="background:#F472B6"></div><div class="name">Chart 5</div></div>
  <div class="swatch"><div class="block" style="background:#A78BFA"></div><div class="name">Chart 6</div></div>
</div>
<div class="chart-preview">
  <div class="bar" style="height:70%;background:#6366F1"></div>
  <div class="bar" style="height:45%;background:#10B981"></div>
  <div class="bar" style="height:85%;background:#F59E0B"></div>
  <div class="bar" style="height:55%;background:#38BDF8"></div>
  <div class="bar" style="height:30%;background:#F472B6"></div>
  <div class="bar" style="height:60%;background:#A78BFA"></div>
</div>
</body>
</html>
