<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #1a1d27; padding: 16px; font-family: var(--font-sans); }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.bar { background: #6366F1; height: 14px; border-radius: 3px; opacity: 0.85; }
.label { font-size: 11px; font-family: monospace; color: #94A3B8; min-width: 60px; }
.px { font-size: 11px; color: #475569; }
</style>
</head>
<body>
<div class="row"><div class="label">--space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
<div class="row"><div class="label">--space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
<div class="row"><div class="label">--space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
<div class="row"><div class="label">--space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
<div class="row"><div class="label">--space-5</div><div class="bar" style="width:20px"></div><div class="px">20px</div></div>
<div class="row"><div class="label">--space-6</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
<div class="row"><div class="label">--space-8</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
<div class="row"><div class="label">--space-12</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
<div class="row"><div class="label">--space-16</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
</body>
</html>
