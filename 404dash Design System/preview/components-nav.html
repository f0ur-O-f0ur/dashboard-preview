<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #0F1117; padding: 0; font-family: var(--font-sans); height: 400px; }
.sidebar { width: 220px; height: 100%; background: rgba(26,29,39,0.95); border-right: 1px solid #2A2D3E; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
.logo { display: flex; align-items: center; gap: 8px; padding: 8px; margin-bottom: 16px; }
.logo-mark { width: 28px; height: 28px; background: #6366F1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; }
.logo-name { font-size: 15px; font-weight: 600; color: #F1F5F9; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; font-size: 13px; font-weight: 500; color: #94A3B8; cursor: pointer; transition: all 150ms; }
.nav-item.active { background: rgba(99,102,241,0.12); color: #818CF8; }
.nav-item:hover:not(.active) { background: rgba(255,255,255,0.04); color: #F1F5F9; }
.nav-icon { width: 16px; height: 16px; opacity: 0.7; font-size: 14px; }
.active .nav-icon { opacity: 1; }
.section-label { font-size: 10px; font-weight: 600; color: #475569; padding: 8px 10px 4px; letter-spacing: 0.06em; text-transform: uppercase; }
.badge { margin-left: auto; background: #6366F1; color: white; font-size: 10px; padding: 1px 6px; border-radius: 9999px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo"><div class="logo-mark">404</div><div class="logo-name">dash</div></div>
  <div class="nav-item active"><span class="nav-icon">⊞</span>개요</div>
  <div class="nav-item"><span class="nav-icon">↗</span>분석</div>
  <div class="nav-item"><span class="nav-icon">≡</span>보고서</div>
  <div class="section-label">관리</div>
  <div class="nav-item"><span class="nav-icon">◎</span>알림 <span class="badge">3</span></div>
  <div class="nav-item"><span class="nav-icon">⊙</span>사용자</div>
  <div class="nav-item"><span class="nav-icon">⚙</span>설정</div>
</div>
</body>
</html>
