<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #1a1d27; padding: 16px; font-family: var(--font-sans); display: flex; gap: 16px; align-items: flex-end; }
.item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.box { width: 52px; height: 52px; background: #2A2E42; border: 1px solid #3A3F58; }
.label { font-size: 10px; font-family: monospace; color: #94A3B8; text-align: center; }
.sub { font-size: 10px; color: #475569; text-align: center; }
</style>
</head>
<body>
<div class="item"><div class="box" style="border-radius:4px"></div><div class="label">--xs</div><div class="sub">4px</div></div>
<div class="item"><div class="box" style="border-radius:6px"></div><div class="label">--sm</div><div class="sub">6px</div></div>
<div class="item"><div class="box" style="border-radius:12px"></div><div class="label">--md</div><div class="sub">12px</div></div>
<div class="item"><div class="box" style="border-radius:16px"></div><div class="label">--lg</div><div class="sub">16px</div></div>
<div class="item"><div class="box" style="border-radius:9999px"></div><div class="label">--full</div><div class="sub">pill</div></div>
</body>
</html>
