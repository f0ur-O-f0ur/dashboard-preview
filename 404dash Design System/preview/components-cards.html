<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { background: #0F1117; padding: 16px; font-family: var(--font-sans); display: flex; gap: 12px; }
.card { background: #1A1D27; border: 1px solid #2A2D3E; border-radius: 12px; padding: 18px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); min-width: 160px; }
.card-label { font-size: 12px; color: #94A3B8; margin-bottom: 8px; }
.card-value { font-size: 26px; font-weight: 700; color: #F1F5F9; font-family: 'DM Mono', monospace; letter-spacing: -0.5px; }
.card-delta { font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
.up { color: #10B981; }
.down { color: #EF4444; }
.card-accent { border-top: 2px solid #6366F1; }
</style>
</head>
<body>
<div class="card card-accent">
  <div class="card-label">총 방문자</div>
  <div class="card-value">84,219</div>
  <div class="card-delta up">▲ 12.4% 전월 대비</div>
</div>
<div class="card">
  <div class="card-label">전환율</div>
  <div class="card-value">3.82%</div>
  <div class="card-delta down">▼ 0.3% 전월 대비</div>
</div>
<div class="card">
  <div class="card-label">수익</div>
  <div class="card-value">₩2.4M</div>
  <div class="card-delta up">▲ 8.1% 전월 대비</div>
</div>
</body>
</html>
