<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />

<style>
/* ── Reset ───────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font-family: inherit; }

/* ── Theme tokens ─────────────────────────── */
:root {
  --accent:        #4F6EF7;
  --accent-soft:   #EEF1FE;
  --success:       #12B76A;
  --success-soft:  #ECFDF5;
  --warning:       #F79009;
  --warning-soft:  #FFFAEB;
  --danger:        #E04444;
  --danger-soft:   #FEF3F2;

  --bg:            #F5F4F2;
  --bg-card:       #FFFFFF;
  --bg-sidebar:    #FFFFFF;
  --border:        rgba(0,0,0,0.07);
  --surface-2:     rgba(0,0,0,0.04);

  --text-primary:   #111110;
  --text-secondary: #6B6B68;
  --text-muted:     #9B9B95;

  --sidebar-width:     240px;
  --sidebar-collapsed: 64px;
  --topbar-height:     60px;

  --shadow-card: 0 1px 2px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.04);
  --radius-card: 14px;
}

[data-theme="dark"] {
  --accent-soft:   rgba(79,110,247,0.15);
  --success-soft:  rgba(18,183,106,0.12);
  --warning-soft:  rgba(247,144,9,0.12);
  --danger-soft:   rgba(224,68,68,0.12);

  --bg:            #0C0E12;
  --bg-card:       #161921;
  --bg-sidebar:    #111318;
  --border:        rgba(255,255,255,0.07);
  --surface-2:     rgba(255,255,255,0.05);

  --text-primary:   #ECECE8;
  --text-secondary: #7E7E85;
  --text-muted:     #5A5A62;

  --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
}

/* ── Base ────────────────────────────────── */
html, body, #root {
  height: 100%; width: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

/* ── Layout shell ─────────────────────────── */
.app-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.app-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* ── Sidebar ──────────────────────────────── */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width 0.22s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
  z-index: 10;
}
.sidebar.collapsed { width: var(--sidebar-collapsed); }

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  min-height: var(--topbar-height);
  position: relative;
}
.logo-mark {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-text {
  font-size: 15px; font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
  white-space: nowrap;
  flex: 1;
}
.collapse-btn {
  width: 24px; height: 24px; border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
  margin-left: auto;
}
.collapse-btn:hover { background: var(--accent-soft); color: var(--accent); }

.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 10px 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 9px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
  width: 100%;
  text-align: left;
  position: relative;
}
.nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 600;
}

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 16px;
}

.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

/* ── Top bar ──────────────────────────────── */
.topbar {
  height: var(--topbar-height);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 16px;
}
.topbar-left { display: flex; align-items: baseline; gap: 12px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }

.page-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 6px 12px;
  transition: border-color 0.15s;
}
.search-box:focus-within { border-color: var(--accent); }

.icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.icon-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: transparent; }

.notif-dot {
  position: absolute; top: 6px; right: 6px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--danger);
  border: 2px solid var(--bg-sidebar);
}

.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  letter-spacing: -0.01em;
}

/* ── Main content ─────────────────────────── */
.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* ── Cards ────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 20px;
  box-shadow: var(--shadow-card);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
}

.card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.chart-card { display: flex; flex-direction: column; }
.widget-card { display: flex; flex-direction: column; }

/* ── KPI row ──────────────────────────────── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.kpi-card {
  display: flex;
  flex-direction: column;
}

/* ── Grid rows ─────────────────────────────── */
.grid-row {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

/* ── Scrollbar ────────────────────────────── */
.main-content::-webkit-scrollbar { width: 5px; }
.main-content::-webkit-scrollbar-track { background: transparent; }
.main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── Transitions ──────────────────────────── */
.sidebar, .topbar, .card, .app-shell, body {
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}

/* ── Responsive ────────────────────────────── */
@media (max-width: 1100px) {
  .kpi-row { grid-template-columns: repeat(2,1fr); }
  .grid-row { flex-wrap: wrap; }
}
@media (max-width: 700px) {
  .kpi-row { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main-content { padding: 16px; }
}
</style>
