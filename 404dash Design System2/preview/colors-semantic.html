<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #FAFAF8; padding: 20px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.swatch { border-radius: 8px; overflow: hidden; }
.swatch-color { height: 52px; border-radius: 8px 8px 0 0; }
.swatch-label { padding: 6px 10px; background: white; border: 1px solid #E8E4DF; border-top: none; border-radius: 0 0 8px 8px; }
.swatch-name { font-size: 11px; font-weight: 600; color: #1A1A1A; }
.swatch-hex { font-family: 'DM Mono', monospace; font-size: 10px; color: #928A80; }
.group-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #928A80; margin-bottom: 6px; margin-top: 4px; }
.semantic-row { display: flex; gap: 8px; flex-wrap: wrap; }
.sem { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid #E8E4DF; border-radius: 8px; padding: 8px 12px; }
.sem-dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }
.sem-name { font-size: 12px; font-weight: 600; color: #1A1A1A; }
.sem-desc { font-size: 10px; color: #928A80; }
</style>
</head>
<body>
<div class="group-label">Status Colors</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#22C55E;"></div><div class="swatch-label"><div class="swatch-name">Success</div><div class="swatch-hex">#22C55E</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F5A623;"></div><div class="swatch-label"><div class="swatch-name">Warning</div><div class="swatch-hex">#F5A623</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#EF4444;"></div><div class="swatch-label"><div class="swatch-name">Danger</div><div class="swatch-hex">#EF4444</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#3B82F6;"></div><div class="swatch-label"><div class="swatch-name">Info</div><div class="swatch-hex">#3B82F6</div></div></div>
</div>
<div class="group-label">Semantic Roles</div>
<div class="semantic-row">
  <div class="sem"><div class="sem-dot" style="background:#1A1A1A;"></div><div><div class="sem-name">fg-primary</div><div class="sem-desc">Main text</div></div></div>
  <div class="sem"><div class="sem-dot" style="background:#6B6358;"></div><div><div class="sem-name">fg-secondary</div><div class="sem-desc">Supporting text</div></div></div>
  <div class="sem"><div class="sem-dot" style="background:#928A80;"></div><div><div class="sem-name">fg-muted</div><div class="sem-desc">Labels, captions</div></div></div>
  <div class="sem"><div class="sem-dot" style="background:#FAFAF8;border:1px solid #E8E4DF;"></div><div><div class="sem-name">bg-canvas</div><div class="sem-desc">Page background</div></div></div>
  <div class="sem"><div class="sem-dot" style="background:#FFFFFF;border:1px solid #E8E4DF;"></div><div><div class="sem-name">bg-surface</div><div class="sem-desc">Cards</div></div></div>
  <div class="sem"><div class="sem-dot" style="background:#FF6B35;"></div><div><div class="sem-name">fg-accent</div><div class="sem-desc">Interactive, CTA</div></div></div>
  <div class="sem"><div class="sem-dot" style="background:#1C1C1E;"></div><div><div class="sem-name">bg-sidebar</div><div class="sem-desc">Navigation bg</div></div></div>
</div>
</body>
</html>
