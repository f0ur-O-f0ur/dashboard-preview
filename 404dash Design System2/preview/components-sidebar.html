<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #FAFAF8; padding: 0; display: flex; height: 180px; overflow: hidden; }

.sidebar { width: 220px; background: #1C1C1E; display: flex; flex-direction: column; padding: 16px 12px; gap: 2px; flex-shrink: 0; height: 180px; overflow: hidden; }
.nav-section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #48484C; padding: 8px 8px 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 150ms; color: #98989F; font-size: 13px; font-weight: 500; }
.nav-item:hover { background: #252527; color: #C7C7CC; }
.nav-item.active { background: rgba(255,107,53,0.12); color: #FF6B35; }
.nav-item svg { flex-shrink: 0; }
.nav-badge { margin-left: auto; background: #FF6B35; color: white; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 9999px; }
.nav-logo { display: flex; align-items: center; gap: 8px; padding: 4px 8px 12px; border-bottom: 1px solid #2E2E31; margin-bottom: 6px; }
.logo-mark { width: 26px; height: 26px; background: #FF6B35; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
.logo-text { font-size: 15px; font-weight: 700; color: #E5E5EA; letter-spacing: -0.02em; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="nav-logo">
    <div class="logo-mark">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div class="logo-text">Pulse</div>
  </div>

  <div class="nav-item active">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Overview
  </div>
  <div class="nav-item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Analytics
    <span class="nav-badge">3</span>
  </div>
  <div class="nav-item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Users
  </div>
  <div class="nav-item">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Reports
  </div>
</div>
</body>
</html>
