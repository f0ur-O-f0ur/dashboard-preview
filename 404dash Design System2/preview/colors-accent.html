<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #FAFAF8; padding: 20px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.swatch { border-radius: 8px; overflow: hidden; }
.swatch-color { height: 52px; border-radius: 8px 8px 0 0; }
.swatch-label { padding: 6px 10px; background: white; border: 1px solid #E8E4DF; border-top: none; border-radius: 0 0 8px 8px; }
.swatch-name { font-size: 11px; font-weight: 600; color: #1A1A1A; }
.swatch-hex { font-family: 'DM Mono', monospace; font-size: 10px; color: #928A80; }
.group-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #928A80; margin-bottom: 6px; margin-top: 4px; }
</style>
</head>
<body>
<div class="group-label">Orange — Primary Accent</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#FFF4EF;border:1px solid #E8E4DF;border-bottom:none;"></div><div class="swatch-label"><div class="swatch-name">Orange 50</div><div class="swatch-hex">#FFF4EF</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#FFC9B0;"></div><div class="swatch-label"><div class="swatch-name">Orange 200</div><div class="swatch-hex">#FFC9B0</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#FFA07A;"></div><div class="swatch-label"><div class="swatch-name">Orange 300</div><div class="swatch-hex">#FFA07A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#FF6B35;"></div><div class="swatch-label"><div class="swatch-name">Orange 500 ★</div><div class="swatch-hex">#FF6B35</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#E85520;"></div><div class="swatch-label"><div class="swatch-name">Orange 600</div><div class="swatch-hex">#E85520</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#9A3109;"></div><div class="swatch-label"><div class="swatch-name">Orange 800</div><div class="swatch-hex">#9A3109</div></div></div>
</div>
<div class="group-label">Amber — Secondary Accent</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#FFFBEB;border:1px solid #E8E4DF;border-bottom:none;"></div><div class="swatch-label"><div class="swatch-name">Amber 50</div><div class="swatch-hex">#FFFBEB</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#FDE68A;"></div><div class="swatch-label"><div class="swatch-name">Amber 200</div><div class="swatch-hex">#FDE68A</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F5A623;"></div><div class="swatch-label"><div class="swatch-name">Amber 500 ★</div><div class="swatch-hex">#F5A623</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#B45309;"></div><div class="swatch-label"><div class="swatch-name">Amber 700</div><div class="swatch-hex">#B45309</div></div></div>
</div>
</body>
</html>
