<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #FAFAF8; padding: 20px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.swatch { border-radius: 8px; overflow: hidden; }
.swatch-color { height: 52px; }
.swatch-label { padding: 6px 10px; background: white; border: 1px solid #E8E4DF; border-top: none; border-radius: 0 0 8px 8px; }
.swatch-name { font-size: 11px; font-weight: 600; color: #1A1A1A; }
.swatch-hex { font-family: 'DM Mono', monospace; font-size: 10px; color: #928A80; }
.group-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #928A80; margin-bottom: 6px; margin-top: 4px; }
</style>
</head>
<body>
<div class="group-label">Warm Neutrals</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#FAFAF8;border:1px solid #E8E4DF;border-bottom:none;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Warm 50</div><div class="swatch-hex">#FAFAF8</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F4F1EC;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Warm 100</div><div class="swatch-hex">#F4F1EC</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#E8E4DF;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Warm 200</div><div class="swatch-hex">#E8E4DF</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#D5CFC8;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Warm 300</div><div class="swatch-hex">#D5CFC8</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#928A80;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Warm 500</div><div class="swatch-hex">#928A80</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#4A4440;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Warm 700</div><div class="swatch-hex">#4A4440</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#1C1A18;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Warm 900</div><div class="swatch-hex">#1C1A18</div></div></div>
</div>
<div class="group-label">Sidebar Dark</div>
<div class="row">
  <div class="swatch"><div class="swatch-color" style="background:#1C1C1E;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Dark 900</div><div class="swatch-hex">#1C1C1E</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#252527;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Dark 800</div><div class="swatch-hex">#252527</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#2E2E31;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Dark 700</div><div class="swatch-hex">#2E2E31</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#48484C;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Dark 500</div><div class="swatch-hex">#48484C</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#98989F;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Dark 300</div><div class="swatch-hex">#98989F</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#C7C7CC;border-radius:8px 8px 0 0;"></div><div class="swatch-label"><div class="swatch-name">Dark 200</div><div class="swatch-hex">#C7C7CC</div></div></div>
</div>
</body>
</html>
